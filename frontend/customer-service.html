        'en': {

            err_empty: 'Please enter a customer issue first.',

            result_suggested_reply: 'Suggested Reply',
            result_handling_tips: 'Handling Suggestions',

    </script>
    <script src="i18n.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a href="index.html" class="flex items-center space-x-3">
                    <img src="logo.png" alt="YUNI" class="h-10 w-auto mt-1.5">
                    <span class="text-lg font-semibold text-slate-900" data-i18n="nav_title">智能客服 Agent</span>
                </a>
                <a href="index.html" class="text-slate-600 hover:text-primary transition-colors text-sm">
                    <i class="fas fa-arrow-left mr-1"></i> <span data-i18n="back_home">返回首页</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8">
            <div class="inline-flex items-center px-4 py-2 rounded-full bg-primary/10 text-primary text-sm font-medium mb-4" data-i18n="badge">
                客服回复与 FAQ 生成
            </div>
            <h1 class="text-4xl font-bold text-slate-900 mb-3" data-i18n="page_title">智能客服 Agent</h1>
            <p class="text-slate-600 max-w-3xl" data-i18n="page_desc">用于生成客服回复、处理建议和 FAQ 归类，适合售前咨询、售后处理、投诉安抚等场景。</p>
        </div>

        <div class="grid lg:grid-cols-[1.1fr_0.9fr] gap-6">
            <section class="bg-white rounded-2xl border border-slate-200 p-6">
                <h2 class="text-lg font-semibold text-slate-900 mb-5" data-i18n="section_input">客服场景输入</h2>
                <div class="space-y-4">
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-slate-600 mb-2" data-i18n="label_scenario">场景类型</label>
                            <select id="scenario" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option value="opt_presales" data-i18n="opt_presales">售前咨询</option>
                                <option value="opt_aftersales" data-i18n="opt_aftersales">售后处理</option>
                                <option value="opt_refund" data-i18n="opt_refund">退款申请</option>
                                <option value="opt_complaint" data-i18n="opt_complaint">投诉安抚</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 mb-2" data-i18n="label_channel">渠道</label>
                            <select id="channel" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option value="opt_online" data-i18n="opt_online">在线客服</option>
                                <option value="opt_email" data-i18n="opt_email">邮件</option>
                                <option value="opt_whatsapp" data-i18n="opt_whatsapp">WhatsApp</option>
                                <option value="opt_wechat" data-i18n="opt_wechat">微信</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-600 mb-2" data-i18n="label_issue">客户问题</label>
                        <textarea id="customer-issue" rows="9" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30 resize-none" data-i18n="placeholder_issue" placeholder="请输入客户咨询或投诉内容..."></textarea>
                    </div>
                    <button id="reply-btn" class="w-full py-3 gradient-bg text-white rounded-xl font-medium hover:bg-primary-dark transition-colors" data-i18n="btn_generate">
                        生成客服回复
                    </button>
                </div>
            </section>

            <section class="bg-white rounded-2xl border border-slate-200 p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-semibold text-slate-900" data-i18n="result_title">输出结果</h2>
                    <span class="text-xs px-3 py-1 rounded-full bg-slate-100 text-slate-500" data-i18n="result_badge">演示界面</span>
                </div>
                <div id="reply-result" class="rounded-2xl bg-slate-50 border border-slate-100 p-5 min-h-[420px] text-slate-700 leading-7" data-i18n="result_placeholder">
                    输入客户问题后，可生成客服回复、处理建议与 FAQ 分类预览。
                </div>
            </section>
        </div>
    </main>

    <script>
        const replyBtn = document.getElementById('reply-btn');
        const replyResult = document.getElementById('reply-result');

        function t(key) {
            const lang = window.YuniI18n ? window.YuniI18n.getLang() : 'zh-CN';
            const dict = (window.PAGE_TRANSLATIONS || {})[lang] || {};
            return dict[key] !== undefined ? dict[key] : key;
        }

        replyBtn.addEventListener('click', () => {
            const scenarioKey = document.getElementById('scenario').value;
            const channelKey = document.getElementById('channel').value;
            const scenarioLabel = t(scenarioKey);
            const channelLabel = t(channelKey);
            const issue = document.getElementById('customer-issue').value.trim();

            if (!issue) {
                replyResult.innerHTML = '<span class="text-slate-400">' + t('err_empty') + '</span>';
                return;
            }

            const replyText = t('reply_template').replace('{issue}', issue);

            replyResult.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <div class="text-sm text-slate-500 mb-1">${t('result_scenario_info')}</div>
                        <div class="text-slate-900 font-medium">${scenarioLabel} / ${channelLabel}</div>
                    </div>
                    <div>
                        <div class="text-sm text-slate-500 mb-1">${t('result_suggested_reply')}</div>
                        <div class="whitespace-pre-wrap">${replyText}</div>
                    </div>
                    <div>
                        <div class="text-sm text-slate-500 mb-1">${t('result_handling_tips')}</div>
                        <ul class="list-disc pl-5 space-y-1">
                            <li>${t('tip1')}</li>
                            <li>${t('tip2')}</li>
                            <li>${t('tip3')}</li>
                        </ul>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
