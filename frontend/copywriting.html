<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a href="index.html" class="flex items-center space-x-3">
                    <img src="logo.png" alt="YUNI" class="h-10 w-auto mt-1.5">
                    <span class="text-lg font-semibold text-slate-900" data-i18n="nav_title">多语言文案 Agent</span>
                </a>
                <a href="index.html" class="text-slate-600 hover:text-primary transition-colors text-sm">
                    <i class="fas fa-arrow-left mr-1"></i> <span data-i18n="back_home">返回首页</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8">
            <div class="inline-flex items-center px-4 py-2 rounded-full bg-primary/10 text-primary text-sm font-medium mb-4" data-i18n="badge">
                中英粤商务文案生成
            </div>
            <h1 class="text-4xl font-bold text-slate-900 mb-3" data-i18n="page_title">多语言文案 Agent</h1>
            <p class="text-slate-600 max-w-3xl" data-i18n="page_desc">适用于品牌介绍、活动宣传、社媒文案与邮件场景，支持一键生成多语言版本与统一语气。</p>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">
            <section class="bg-white rounded-2xl border border-slate-200 p-6">
                <h2 class="text-lg font-semibold text-slate-900 mb-5" data-i18n="config_title">文案配置</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-600 mb-2" data-i18n="label_content_type">文案类型</label>
                        <select id="content-type" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                            <option data-i18n="opt_brand">品牌介绍</option>
                            <option data-i18n="opt_product">产品卖点</option>
                            <option data-i18n="opt_campaign">活动推广</option>
                            <option data-i18n="opt_social">社交媒体文案</option>
                            <option data-i18n="opt_email">邮件营销</option>
                        </select>
                    </div>
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-slate-600 mb-2" data-i18n="label_language">目标语言</label>
                            <select id="language" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option data-i18n="opt_zh_cn">简体中文</option>
                                <option data-i18n="opt_en">English</option>
                                <option data-i18n="opt_cantonese">粤语</option>
                                <option data-i18n="opt_bilingual">中英双语</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 mb-2" data-i18n="label_tone">语气风格</label>
                            <select id="tone" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option data-i18n="opt_formal">专业正式</option>
                                <option data-i18n="opt_premium">高端简洁</option>
                                <option data-i18n="opt_friendly">亲和自然</option>
                                <option data-i18n="opt_marketing">营销转化</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-600 mb-2" data-i18n="label_core">核心内容</label>
                        <textarea id="brief" rows="8" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30 resize-none" data-i18n="placeholder_brief" placeholder="请输入产品/服务信息、目标受众、想突出的卖点..."></textarea>
                    </div>
                    <button id="generate-btn" class="w-full py-3 gradient-bg text-white rounded-xl font-medium hover:bg-primary-dark transition-colors" data-i18n="btn_generate">
                        生成文案
                    </button>
                </div>
            </section>

            <section class="bg-white rounded-2xl border border-slate-200 p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-semibold text-slate-900" data-i18n="result_title">生成结果</h2>
                    <span class="text-xs px-3 py-1 rounded-full bg-slate-100 text-slate-500" data-i18n="result_badge">演示界面</span>
                </div>
                <div id="result" class="rounded-2xl bg-slate-50 border border-slate-100 p-5 min-h-[420px] text-slate-700 leading-7">
                    <span data-i18n="result_placeholder">请选择配置并输入内容，点击“生成文案”查看预览。</span>
                </div>
            </section>
        </div>
    </main>

    <script>
        function t(k) { const lang = (window.YuniI18n && window.YuniI18n.getLang()) || 'zh-CN'; const d = (window.PAGE_TRANSLATIONS || {})[lang] || {}; return d[k] !== undefined ? d[k] : k; }
        const generateBtn = document.getElementById('generate-btn');
        const result = document.getElementById('result');

        generateBtn.addEventListener('click', () => {
            const type = document.getElementById('content-type').value;
            const language = document.getElementById('language').value;
            const tone = document.getElementById('tone').value;
            const brief = document.getElementById('brief').value.trim();

            if (!brief) {
                result.innerHTML = '<span class="text-slate-400">' + t('err_empty') + '</span>';
                return;
            }

            result.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <div class="text-sm text-slate-500 mb-1">` + t('label_gen_config') + `</div>
                        <div class="text-slate-900 font-medium">${type} / ${language} / ${tone}</div>
                    </div>
                    <div>
                        <div class="text-sm text-slate-500 mb-1">` + t('label_recommended_title') + `</div>
                        <div class="text-slate-900 font-semibold">` + t('sample_title') + `</div>
                    </div>
                    <div>
                        <div class="text-sm text-slate-500 mb-1">` + t('label_preview') + `</div>
                        <div class="whitespace-pre-wrap">` + (t('preview_tpl').replace(/\{tone\}/g, tone).replace(/\{brief\}/g, brief).replace(/\{type\}/g, type).replace(/\{language\}/g, language)) + `</div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
