<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多语言文案助手 | YUNI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6A3AB7',
                        'primary-dark': '#5a2fa0',
                        'primary-light': '#8b5cbf',
                        dark: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .gradient-bg { background: #6A3AB7; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a href="index.html" class="flex items-center space-x-3">
                    <img src="logo.png" alt="YUNI" class="h-10 w-auto mt-1.5">
                    <span class="text-lg font-semibold text-slate-900">多语言文案助手</span>
                </a>
                <a href="index.html" class="text-slate-600 hover:text-primary transition-colors text-sm">
                    <i class="fas fa-arrow-left mr-1"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8">
            <div class="inline-flex items-center px-4 py-2 rounded-full bg-primary/10 text-primary text-sm font-medium mb-4">
                中英粤商务文案生成
            </div>
            <h1 class="text-4xl font-bold text-slate-900 mb-3">多语言文案助手</h1>
            <p class="text-slate-600 max-w-3xl">适用于品牌介绍、活动宣传、社媒文案与邮件场景，支持一键生成多语言版本与统一语气。</p>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">
            <section class="bg-white rounded-2xl border border-slate-200 p-6">
                <h2 class="text-lg font-semibold text-slate-900 mb-5">文案配置</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-600 mb-2">文案类型</label>
                        <select id="content-type" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                            <option>品牌介绍</option>
                            <option>产品卖点</option>
                            <option>活动推广</option>
                            <option>社交媒体文案</option>
                            <option>邮件营销</option>
                        </select>
                    </div>
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-slate-600 mb-2">目标语言</label>
                            <select id="language" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option>简体中文</option>
                                <option>English</option>
                                <option>粤语</option>
                                <option>中英双语</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 mb-2">语气风格</label>
                            <select id="tone" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option>专业正式</option>
                                <option>高端简洁</option>
                                <option>亲和自然</option>
                                <option>营销转化</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-600 mb-2">核心内容</label>
                        <textarea id="brief" rows="8" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/30 resize-none" placeholder="请输入产品/服务信息、目标受众、想突出的卖点..."></textarea>
                    </div>
                    <button id="generate-btn" class="w-full py-3 gradient-bg text-white rounded-xl font-medium hover:bg-primary-dark transition-colors">
                        生成文案
                    </button>
                </div>
            </section>

            <section class="bg-white rounded-2xl border border-slate-200 p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-semibold text-slate-900">生成结果</h2>
                    <span class="text-xs px-3 py-1 rounded-full bg-slate-100 text-slate-500">演示界面</span>
                </div>
                <div id="result" class="rounded-2xl bg-slate-50 border border-slate-100 p-5 min-h-[420px] text-slate-700 leading-7">
                    请选择配置并输入内容，点击“生成文案”查看预览。
                </div>
            </section>
        </div>
    </main>

    <script>
        const generateBtn = document.getElementById('generate-btn');
        const result = document.getElementById('result');

        generateBtn.addEventListener('click', () => {
            const type = document.getElementById('content-type').value;
            const language = document.getElementById('language').value;
            const tone = document.getElementById('tone').value;
            const brief = document.getElementById('brief').value.trim();

            if (!brief) {
                result.innerHTML = '<span class="text-slate-400">请先输入核心内容。</span>';
                return;
            }

            result.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <div class="text-sm text-slate-500 mb-1">生成配置</div>
                        <div class="text-slate-900 font-medium">${type} / ${language} / ${tone}</div>
                    </div>
                    <div>
                        <div class="text-sm text-slate-500 mb-1">推荐标题</div>
                        <div class="text-slate-900 font-semibold">让品牌表达更清晰，让传播更有效</div>
                    </div>
                    <div>
                        <div class="text-sm text-slate-500 mb-1">文案预览</div>
                        <div class="whitespace-pre-wrap">基于您提供的信息，我们建议采用“${tone}”语气，围绕核心卖点进行精炼表达。\n\n${brief}\n\n这是一段适合用于${type}场景的示例文案，已按${language}输出逻辑进行结构规划，可继续接入正式生成接口。</div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
