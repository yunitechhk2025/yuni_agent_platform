    <script>
        function t(k) { const lang = (window.YuniI18n && window.YuniI18n.getLang()) || 'zh-CN'; const d = (window.PAGE_TRANSLATIONS || {})[lang] || {}; return d[k] !== undefined ? d[k] : k; }
        const API_BASE = CONFIG.API_BASE;
        const STORAGE_KEY = 'knowledge_base_files';
        
        // 从 localStorage 加载文件列表
        function loadFiles() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }
        
        function saveFiles(files) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
            renderFileList();
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function formatDate(date) {
            return new Date(date).toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function renderFileList() {
            const files = loadFiles();
            const tbody = document.getElementById('file-list');
            const emptyRow = document.getElementById('empty-row');
            const fileCount = document.getElementById('file-count');
            
            fileCount.textContent = t('file_count_tpl').replace('{n}', files.length);
            
            if (files.length === 0) {
                tbody.innerHTML = `
                    <tr id="empty-row">
                        <td colspan="4" class="px-4 py-12 text-center text-gray-400">
                            <i class="fas fa-inbox text-4xl mb-2 block opacity-50"></i>
                            ${t('empty_file')}
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = files.map((f, i) => `
                <tr class="file-row border-t border-gray-100" data-id="${f.id}">
                    <td class="px-4 py-3">
                        <i class="fas fa-file-alt text-primary mr-2"></i>
                        <span class="text-dark font-medium truncate max-w-[200px] inline-block" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
                    </td>
                    <td class="px-4 py-3 text-gray-600">${formatSize(f.size)}</td>
                    <td class="px-4 py-3 text-gray-600">${formatDate(f.uploadTime)}</td>
                    <td class="px-4 py-3 text-right">
                        <button onclick="deleteFile('${f.id}')" class="text-red-500 hover:text-red-600 p-1 rounded hover:bg-red-50" title="${t('btn_delete_title')}">
                            <i class="fas fa-trash-alt text-sm"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function deleteFile(id) {
            const files = loadFiles().filter(f => f.id !== id);
            saveFiles(files);
        }
        
        function generateId() {
            return 'kb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
        }
        
        // 上传逻辑
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const uploadContent = document.getElementById('upload-content');
        const uploadProgress = document.getElementById('upload-progress');
        const progressBar = document.getElementById('progress-bar');
        
        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            handleFiles(files);
        });
        
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleFiles(files);
            e.target.value = '';
        });
        
        function handleFiles(files) {
            const validExt = ['.pdf', '.doc', '.docx', '.txt', '.md', '.xlsx', '.xls', '.csv'];
            const validFiles = files.filter(f => {
                const ext = '.' + f.name.split('.').pop().toLowerCase();
                return validExt.includes(ext);
            });
            
            if (validFiles.length === 0) {
                alert(t('alert_file_format'));
                return;
            }
            
            uploadContent.classList.add('hidden');
            uploadProgress.classList.remove('hidden');
            
            let processed = 0;
            const existingFiles = loadFiles();
            
            validFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const newFile = {
                        id: generateId(),
                        name: file.name,
                        size: file.size,
                        uploadTime: new Date().toISOString(),
                        type: file.type
                    };
                    existingFiles.push(newFile);
                    processed++;
                    progressBar.style.width = (processed / validFiles.length * 100) + '%';
                    
                    if (processed === validFiles.length) {
                        saveFiles(existingFiles);
                        setTimeout(() => {
                            uploadContent.classList.remove('hidden');
                            uploadProgress.classList.add('hidden');
                            progressBar.style.width = '0%';
                        }, 500);
                    }
                };
                reader.readAsDataURL(file);
            });
        }
        
        // 智能问答（预留 API 对接）
        async function sendQuestion() {
            const input = document.getElementById('chat-input');
            const query = input.value.trim();
            if (!query) return;
            
            const messagesDiv = document.getElementById('chat-messages');
            const sendBtn = document.getElementById('send-btn');
            
            messagesDiv.insertAdjacentHTML('beforeend', `
                <div class="flex justify-end">
                    <div class="bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%]">
                        <p>${escapeHtml(query)}</p>
                    </div>
                </div>
            `);
            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            messagesDiv.insertAdjacentHTML('beforeend', `
                <div id="typing-indicator" class="flex justify-start">
                    <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-4 py-3">
                        <div class="flex space-x-1">
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                        </div>
                    </div>
                </div>
            `);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            try {
                // 预留：对接知识库 API，当前使用模拟回复
                const files = loadFiles();
                let answer;
                if (files.length === 0) {
                    answer = t('answer_empty');
                } else {
                    answer = t('answer_with_files').replace('{q}', query).replace('{n}', files.length);
                }
                
                document.getElementById('typing-indicator')?.remove();
                messagesDiv.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-start fade-in">
                        <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[90%]">
                            <div class="markdown-content text-sm">${escapeHtml(answer).replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>
                `);
            } catch (e) {
                document.getElementById('typing-indicator')?.remove();
                messagesDiv.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-start">
                        <div class="bg-red-50 text-red-600 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[90%] text-sm">
                            ${t('error_request')}${escapeHtml(e.message)}
                        </div>
                    </div>
                `);
            }
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }
        
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });
        
        window.addEventListener('yuni-lang-changed', () => renderFileList());
        
        // 初始化
        renderFileList();
    </script>
</body>
</html>
