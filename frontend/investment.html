        .markdown-report strong { font-weight: 600; color: #1e293b; }
        .markdown-report em { font-style: italic; color: #64748b; }
        .markdown-report code {
            background: #f1f5f9;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            font-family: 'Menlo', 'Monaco', monospace;
            color: #6A3AB7;
        }
        .markdown-report pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .markdown-report pre code { background: transparent; padding: 0; color: inherit; }
        .markdown-report hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
        .markdown-report table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.875rem;
        }
        .markdown-report th, .markdown-report td {
            border: 1px solid #e2e8f0;
            padding: 0.75rem;
            text-align: left;
        }
        .markdown-report th { background: #f8fafc; font-weight: 600; color: #1e293b; }
        .markdown-report blockquote {
            border-left: 4px solid #6A3AB7;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #64748b;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
        .markdown-report a { color: #6A3AB7; text-decoration: underline; }

<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-100">

                    <i class="fas fa-chart-line"></i><span data-i18n="badge">AI 驱动的投资研究</span>

                    <i class="fas fa-file-contract"></i> Markdown 报告
                </span>
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-50 border border-amber-200/60 text-xs font-medium text-amber-700">
                    <i class="fas fa-bolt"></i> 30s 快速生成
                </span>
            </div>
        </div>

        <div class="grid lg:grid-cols-[1fr_1.2fr] gap-6">

                    <h2 class="text-base font-semibold text-slate-900 mb-4">

                    </h2>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setStock(t('stock_tencent'))" class="quick-stock px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium" data-i18n="stock_tencent">腾讯</button>
                        <button onclick="setStock(t('stock_alibaba'))" class="quick-stock px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium" data-i18n="stock_alibaba">阿里巴巴</button>
                        <button onclick="setStock(t('stock_nvidia'))" class="quick-stock px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium" data-i18n="stock_nvidia">英伟达</button>
                        <button onclick="setStock(t('stock_apple'))" class="quick-stock px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium" data-i18n="stock_apple">苹果</button>
                        <button onclick="setStock(t('stock_tesla'))" class="quick-stock px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium" data-i18n="stock_tesla">特斯拉</button>

                    </div>

                            <span class="text-sm text-slate-700" data-i18n="opt_fundamental">基本面分析</span>
                        </label>
                        <label class="flex items-center space-x-2 p-2.5 bg-slate-50 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors">
                            <input type="checkbox" checked class="w-4 h-4 text-primary rounded accent-primary">

                            <input type="checkbox" checked class="w-4 h-4 text-primary rounded accent-primary">
                            <span class="text-sm text-slate-700" data-i18n="opt_recommendation">投资建议</span>
                        </label>
                    </div>

                    <button onclick="generateReport()" id="submit-btn"
                            class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary-dark transition-colors flex items-center justify-center gap-2 text-sm">
                        <i class="fas fa-file-alt"></i>

                                    <i class="fas fa-chart-pie text-xl text-primary animate-pulse"></i>
                                </div>
                                <h3 class="text-base font-semibold text-slate-900 mb-2" data-i18n="loading_title">AI 正在分析...</h3>

                                <div class="w-full max-w-xs mx-auto bg-slate-200 rounded-full h-1.5 overflow-hidden">

        </div>
    </main>

    <script src="config.js"></script>
    <script>
        const API_BASE = CONFIG.API_BASE;
        const input = document.getElementById('stock-input');
        let reportContent = '';
        let reportGeneratedDate = null;

        function t(k) {
            const lang = (window.YuniI18n && window.YuniI18n.getLang()) || 'zh-CN';
            const d = (window.PAGE_TRANSLATIONS || {})[lang] || {};
            return d[k] !== undefined ? d[k] : k;
        }

        marked.setOptions({ breaks: true, gfm: true });

        function setStock(stock) {
            input.value = stock;
            input.focus();
            document.querySelectorAll('.quick-stock').forEach(btn => {
                if (btn.textContent.trim() === stock) {
                    btn.className = 'quick-stock px-4 py-2 bg-primary text-white rounded-full text-sm font-medium';
                } else {
                    btn.className = 'quick-stock px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium';
                }
            });
        }

        function showLoading() {
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('report-content').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('actions-section').classList.add('hidden');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> ' + t('loading_btn');
        }

        function hideLoading() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerHTML = '<i class="fas fa-file-alt mr-2"></i> ' + t('btn_generate');
        }

        function showResults(data) {
            hideLoading();
            const answer = data.answer || '';
            reportContent = answer;

            const stockName = input.value.trim();
            const lang = (window.YuniI18n && window.YuniI18n.getLang()) || 'zh-CN';
            reportGeneratedDate = new Date();
            document.getElementById('report-title').textContent = stockName + t('report_title_suffix');
            document.getElementById('report-meta').textContent = t('report_meta_prefix') + reportGeneratedDate.toLocaleString(lang === 'en' ? 'en-US' : lang);

            const contentEl = document.getElementById('report-content');
            contentEl.innerHTML = marked.parse(answer);
            contentEl.classList.remove('hidden');
            document.getElementById('actions-section').classList.remove('hidden');
            document.getElementById('actions-section').classList.add('flex');

            contentEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showError(message) {
            hideLoading();
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').textContent = message;
        }

        function resetForm() {
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('report-content').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('actions-section').classList.add('hidden');
            input.value = '';
            reportContent = '';
            reportGeneratedDate = null;
            document.getElementById('report-title').textContent = t('report_title_default');
            document.getElementById('report-meta').textContent = t('report_meta_placeholder');

            document.querySelectorAll('.quick-stock').forEach(btn => {
                btn.className = 'quick-stock px-4 py-2 bg-slate-100 text-slate-700 rounded-full text-sm font-medium';
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function copyReport() {
            if (reportContent) {
                navigator.clipboard.writeText(reportContent).then(() => {
                    alert(t('alert_copied'));
                });
            }
        }

        async function generateReport() {
            const stock = input.value.trim();
            if (!stock) {
                alert(t('err_empty'));
                input.focus();
                return;
            }

            showLoading();

            try {
                const response = await fetch(`${API_BASE}/api/investment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: stock }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || t('err_request'));
                }

                const data = await response.json();
                if (data.status === 'succeeded' && data.answer) {
                    showResults(data);
                } else {
                    throw new Error(t('err_incomplete'));
                }
            } catch (error) {
                showError(error.message);
            }
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') generateReport();
        });

        window.addEventListener('yuni-lang-changed', () => {
            const contentEl = document.getElementById('report-content');
            if (!contentEl.classList.contains('hidden') && reportContent && reportGeneratedDate) {
                const stockName = input.value.trim();
                document.getElementById('report-title').textContent = stockName + t('report_title_suffix');
                const lang = (window.YuniI18n && window.YuniI18n.getLang()) || 'zh-CN';
                document.getElementById('report-meta').textContent = t('report_meta_prefix') + reportGeneratedDate.toLocaleString(lang === 'en' ? 'en-US' : lang);
            }
        });
    </script>
</body>
</html>
