<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 解决方案生成器 | YUNI Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        'primary-dark': '#4f46e5',
                        'primary-light': '#818cf8',
                        secondary: '#0ea5e9',
                        dark: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .btn-glow {
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }
        
        .btn-glow:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }
        
        .loading-dots span {
            animation: loading 1.4s infinite ease-in-out both;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes loading {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            transition: all 0.3s ease;
        }
        
        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }
        
        .tag {
            transition: all 0.2s ease;
        }
        
        .tag:hover {
            transform: scale(1.05);
        }
        
        .hero-pattern {
            background-color: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236366f1' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="hero-pattern min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-8 h-8 gradient-bg rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-sm">Y</span>
                    </div>
                    <span class="text-lg font-bold text-dark">YuniTech</span>
                </a>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-gray-600 hover:text-primary transition-colors text-sm">
                        <i class="fas fa-arrow-left mr-1"></i> 返回平台
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-dark mb-4">
                AI <span class="gradient-text">解决方案</span>生成器
            </h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto">
                描述您的业务痛点，AI 为您定制专属技术方案
            </p>
        </div>

        <!-- Input Section -->
        <div class="glass-card rounded-2xl p-6 md:p-8 shadow-xl mb-8">
            <!-- Industry Tags -->
            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="setIndustry('零售')" class="tag px-4 py-2 bg-primary/10 text-primary rounded-full text-sm font-medium hover:bg-primary/20">零售</button>
                <button onclick="setIndustry('餐饮')" class="tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200">餐饮</button>
                <button onclick="setIndustry('物流')" class="tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200">物流</button>
                <button onclick="setIndustry('医疗')" class="tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200">医疗</button>
                <button onclick="setIndustry('教育')" class="tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200">教育</button>
                <button onclick="setIndustry('金融')" class="tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200">金融</button>
                <button onclick="setIndustry('美容')" class="tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200">美容</button>
                <button onclick="setIndustry('酒店')" class="tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200">酒店</button>
            </div>

            <!-- Textarea -->
            <div class="relative mb-6">
                <textarea id="painpoint-input" 
                          rows="4"
                          placeholder="请描述您的业务痛点，例如：&#10;• 客户流失率高，缺乏有效的会员管理系统&#10;• 库存管理混乱，经常出现缺货或积压&#10;• 员工排班困难，人力成本难以控制"
                          class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-primary input-glow resize-none text-gray-700"></textarea>
                <div class="absolute bottom-3 right-3 text-xs text-gray-400">
                    <span id="char-count">0</span> / 500
                </div>
            </div>

            <!-- Submit Button -->
            <button onclick="generateSolution()" id="submit-btn"
                    class="w-full py-4 gradient-bg text-white rounded-xl font-semibold btn-glow transition-all flex items-center justify-center space-x-2">
                <span>生成解决方案</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden text-center py-12">
            <div class="inline-flex items-center space-x-3 bg-white rounded-full px-6 py-3 shadow-lg">
                <div class="loading-dots flex space-x-1">
                    <span class="w-2 h-2 bg-primary rounded-full"></span>
                    <span class="w-2 h-2 bg-primary rounded-full"></span>
                    <span class="w-2 h-2 bg-primary rounded-full"></span>
                </div>
                <span class="text-gray-600">AI 正在分析您的需求...</span>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="hidden space-y-6 fade-in">
            <!-- Solution Header -->
            <div id="solution-header" class="glass-card rounded-2xl p-6 shadow-lg">
                <div class="flex items-start justify-between mb-4">
                    <div>
                        <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-medium">
                            <i class="fas fa-check-circle mr-1"></i> 分析完成
                        </span>
                    </div>
                    <button onclick="resetForm()" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>
                <h2 id="solution-name" class="text-2xl font-bold text-dark mb-2"></h2>
                <p id="solution-desc" class="text-gray-600"></p>
            </div>

            <!-- Main Cards Grid -->
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Development Cost Card -->
                <div class="result-card bg-white rounded-2xl p-6 shadow-lg border border-gray-100">
                    <div class="flex items-center space-x-3 mb-4">
                        <div class="w-12 h-12 bg-violet-100 rounded-xl flex items-center justify-center">
                            <i class="fas fa-code text-xl text-violet-600"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-dark">开发费用</h3>
                            <p class="text-sm text-gray-500">一次性投入</p>
                        </div>
                    </div>
                    <div class="mb-4">
                        <span class="text-3xl font-bold gradient-text" id="dev-price">--</span>
                        <span class="text-gray-500 ml-1" id="dev-currency">HKD</span>
                    </div>
                    <div class="flex items-center text-sm text-gray-600 mb-4">
                        <i class="fas fa-clock mr-2 text-gray-400"></i>
                        <span>预计周期：</span>
                        <span class="font-medium ml-1" id="dev-duration">--</span>
                    </div>
                    <div id="tech-stack" class="flex flex-wrap gap-2">
                        <!-- Tech stack tags will be inserted here -->
                    </div>
                </div>

                <!-- Maintenance Cost Card -->
                <div class="result-card bg-white rounded-2xl p-6 shadow-lg border border-gray-100">
                    <div class="flex items-center space-x-3 mb-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                            <i class="fas fa-server text-xl text-blue-600"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-dark">维护费用</h3>
                            <p class="text-sm text-gray-500">每月支出</p>
                        </div>
                    </div>
                    <div class="mb-4">
                        <span class="text-3xl font-bold gradient-text" id="maint-price">--</span>
                        <span class="text-gray-500 ml-1" id="maint-currency">HKD/月</span>
                    </div>
                    <div id="maint-resources" class="space-y-2">
                        <!-- Maintenance resources will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Features Card -->
            <div class="result-card bg-white rounded-2xl p-6 shadow-lg border border-gray-100">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center">
                        <i class="fas fa-star text-xl text-emerald-600"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-dark">核心功能</h3>
                        <p class="text-sm text-gray-500">解决方案亮点</p>
                    </div>
                </div>
                <div id="features-list" class="grid md:grid-cols-2 gap-3">
                    <!-- Features will be inserted here -->
                </div>
            </div>

            <!-- Resources Card -->
            <div class="result-card bg-white rounded-2xl p-6 shadow-lg border border-gray-100">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center">
                        <i class="fas fa-cubes text-xl text-amber-600"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-dark">推荐资源</h3>
                        <p class="text-sm text-gray-500">开发所需服务</p>
                    </div>
                </div>
                <div id="resources-list" class="grid md:grid-cols-2 gap-3">
                    <!-- Resources will be inserted here -->
                </div>
            </div>

            <!-- AI Reasoning -->
            <div class="bg-gray-50 rounded-2xl p-6 border border-gray-200">
                <div class="flex items-center space-x-2 mb-3">
                    <i class="fas fa-robot text-primary"></i>
                    <span class="font-medium text-dark">AI 分析说明</span>
                </div>
                <p id="ai-reasoning" class="text-gray-600 text-sm leading-relaxed"></p>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4">
                <a href="https://yunitechhk.com/" class="flex-1 py-3 bg-primary text-white rounded-xl font-semibold text-center hover:bg-primary-dark transition-colors">
                    <i class="fas fa-phone mr-2"></i> 联系我们获取报价
                </a>
                <button onclick="resetForm()" class="flex-1 py-3 bg-white border-2 border-gray-200 text-gray-700 rounded-xl font-semibold hover:border-primary hover:text-primary transition-colors">
                    <i class="fas fa-plus mr-2"></i> 分析新痛点
                </button>
            </div>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden">
            <div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-exclamation-triangle text-2xl text-red-500"></i>
                </div>
                <h3 class="text-lg font-semibold text-red-700 mb-2">分析失败</h3>
                <p id="error-message" class="text-red-600 mb-4"></p>
                <button onclick="resetForm()" class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
                    重试
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center text-gray-500 text-sm">
        <p>Powered by <a href="https://yunitechhk.com/" class="text-primary hover:underline">Yuni Tech Limited</a></p>
    </footer>

    <script src="config.js"></script>
    <script>
        const API_BASE = CONFIG.API_BASE;
        const textarea = document.getElementById('painpoint-input');
        const charCount = document.getElementById('char-count');
        
        textarea.addEventListener('input', () => {
            charCount.textContent = textarea.value.length;
        });
        
        function setIndustry(industry) {
            const current = textarea.value.trim();
            if (current) {
                textarea.value = `【${industry}行业】${current}`;
            } else {
                textarea.value = `【${industry}行业】`;
            }
            textarea.focus();
            charCount.textContent = textarea.value.length;
            
            // Update tag styles
            document.querySelectorAll('.tag').forEach(tag => {
                if (tag.textContent.trim() === industry) {
                    tag.className = 'tag px-4 py-2 bg-primary/10 text-primary rounded-full text-sm font-medium hover:bg-primary/20';
                } else {
                    tag.className = 'tag px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200';
                }
            });
        }
        
        function showLoading() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 分析中...';
        }
        
        function hideLoading() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerHTML = '<span>生成解决方案</span><i class="fas fa-arrow-right ml-2"></i>';
        }
        
        function showResults(data) {
            hideLoading();
            document.getElementById('results-section').classList.remove('hidden');
            
            const output = data.outputs?.output || data.outputs || {};
            const solution = output.solution || output;
            
            // Solution header
            document.getElementById('solution-name').textContent = solution.name || '智能解决方案';
            document.getElementById('solution-desc').textContent = solution.description || solution.painPoint || '';
            
            // Development info
            const dev = solution.development || {};
            document.getElementById('dev-price').textContent = formatPrice(dev.price);
            document.getElementById('dev-currency').textContent = dev.currency || 'HKD';
            document.getElementById('dev-duration').textContent = dev.duration || '待评估';
            
            // Tech stack
            const techStackEl = document.getElementById('tech-stack');
            techStackEl.innerHTML = '';
            (dev.techStack || []).forEach(tech => {
                techStackEl.innerHTML += `<span class="px-3 py-1 bg-violet-50 text-violet-600 rounded-lg text-sm">${tech}</span>`;
            });
            
            // Maintenance info
            const maint = solution.maintenance || {};
            document.getElementById('maint-price').textContent = formatPrice(maint.monthlyPrice);
            
            // Maintenance resources
            const maintResourcesEl = document.getElementById('maint-resources');
            maintResourcesEl.innerHTML = '';
            (maint.resources || []).forEach(res => {
                maintResourcesEl.innerHTML += `
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-600">${res.name || res.type}</span>
                        <span class="font-medium text-gray-800">${res.monthlyCost ? formatPrice(res.monthlyCost) : '--'}</span>
                    </div>
                `;
            });
            
            // Features
            const featuresEl = document.getElementById('features-list');
            featuresEl.innerHTML = '';
            (solution.features || []).forEach(feature => {
                featuresEl.innerHTML += `
                    <div class="flex items-start space-x-2">
                        <i class="fas fa-check-circle text-emerald-500 mt-1"></i>
                        <span class="text-gray-700">${feature}</span>
                    </div>
                `;
            });
            
            // Development resources
            const resourcesEl = document.getElementById('resources-list');
            resourcesEl.innerHTML = '';
            (dev.resources || []).forEach(res => {
                resourcesEl.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <div class="font-medium text-gray-800 text-sm">${res.name}</div>
                            <div class="text-xs text-gray-500">${res.type}</div>
                        </div>
                        ${res.specs ? `<span class="text-xs text-gray-400">${res.specs}</span>` : ''}
                    </div>
                `;
            });
            
            // Human resources
            (dev.humanResources || []).forEach(hr => {
                resourcesEl.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <div class="font-medium text-gray-800 text-sm">${hr.role}</div>
                            <div class="text-xs text-gray-500">人员 × ${hr.count}</div>
                        </div>
                        <span class="text-xs text-gray-400">${hr.duration}</span>
                    </div>
                `;
            });
            
            // AI reasoning
            document.getElementById('ai-reasoning').textContent = output.reasoning || '基于您描述的业务痛点，AI 为您推荐了以上解决方案。';
            
            // Scroll to results
            document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function showError(message) {
            hideLoading();
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').textContent = message;
        }
        
        function resetForm() {
            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            textarea.value = '';
            charCount.textContent = '0';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function formatPrice(price) {
            if (!price) return '--';
            return price.toLocaleString();
        }
        
        async function generateSolution() {
            const painpoint = textarea.value.trim();
            
            if (!painpoint) {
                alert('请输入您的业务痛点');
                textarea.focus();
                return;
            }
            
            if (painpoint.length < 10) {
                alert('请详细描述您的痛点（至少10个字符）');
                textarea.focus();
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/api/painpoint`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: painpoint }),
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '请求失败');
                }
                
                const data = await response.json();
                
                if (data.status === 'succeeded' && data.outputs) {
                    showResults(data);
                } else {
                    throw new Error('分析未完成，请重试');
                }
                
            } catch (error) {
                showError(error.message);
            }
        }
        
        // Enter key to submit
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateSolution();
            }
        });
    </script>
</body>
</html>
